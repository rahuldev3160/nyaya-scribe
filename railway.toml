[build]
builder = "NIXPACKS"

[deploy]
startCommand = "streamlit run web/app.py --server.port $PORT --server.headless true --server.address 0.0.0.0"
healthcheckPath = "/"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Mount a Railway volume at /app/data so SQLite files survive redeploys.
# In the Railway dashboard: Storage → Add Volume → Mount Path: /app/data
