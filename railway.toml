[build]
builder = "NIXPACKS"

[deploy]
startCommand = "python3 scripts/migrate.py && gunicorn --chdir web 'wsgi:app' --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
healthcheckPath = "/"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Mount a Railway volume at /app/data so SQLite files survive redeploys.
# In the Railway dashboard: Storage → Add Volume → Mount Path: /app/data
